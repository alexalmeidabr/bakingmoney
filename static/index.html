<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BakingMoney Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>BakingMoney</h1>
        <nav>
          <button class="menu-item active" data-view="positions">My Positions</button>
          <button class="menu-item" data-view="watchlist">Watchlist</button>
        </nav>
      </aside>

      <main class="content">
        <section id="positions" class="view active">
          <div class="view-header">
            <h2>My Positions</h2>
            <button id="refresh-btn">Refresh</button>
          </div>

          <p id="status" class="status">Loading positions…</p>

          <div class="table-wrap">
            <table id="positions-table" class="hidden">
              <thead>
                <tr>
                  <th>Symbol</th>
                  <th>Position</th>
                  <th>Price</th>
                  <th>Avg Cost</th>
                  <th>Change %</th>
                  <th>Market Value</th>
                  <th>Unrealized P&L</th>
                  <th>Daily P&L</th>
                  <th>Currency</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>

        <section id="watchlist" class="view">
          <div class="view-header">
            <h2>Watchlist</h2>
            <div class="watchlist-actions">
              <input id="watchlist-symbol-input" type="text" placeholder="e.g. MSFT" maxlength="16" />
              <button id="add-symbol-btn">Add Symbol</button>
              <button id="add-positions-btn">Add From Positions</button>
            </div>
          </div>

          <p id="watchlist-status" class="status">Loading watchlist…</p>

          <div class="table-wrap">
            <table id="watchlist-table" class="hidden">
              <thead>
                <tr>
                  <th>Symbol</th>
                  <th>Price</th>
                  <th>P/E</th>
                  <th>Forward P/E</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
